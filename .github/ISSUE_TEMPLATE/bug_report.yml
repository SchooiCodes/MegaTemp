name: 🐛 Bug report
description: Report something that isn't working
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill this out
        as completely as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Run `python main.py`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output / logs
      description: Paste the full console output (redact any credentials!).
      render: shell
  - type: input
    id: os
    attributes:
      label: Operating system
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.14"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser (Chromium/Chrome/Brave/Edge) + version
    validations:
      required: true
