name: Build executable

# Builds a standalone MegaTemp binary (no Python required to run) for Linux,
# Windows and macOS using PyInstaller, and uploads them as workflow artifacts.
# NOTE: a Chromium-based browser must still be installed on the target machine.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: MegaTemp-linux
            binary: dist/MegaTemp
          - os: windows-latest
            artifact: MegaTemp-windows
            binary: dist/MegaTemp.exe
          - os: macos-latest
            artifact: MegaTemp-macos
            binary: dist/MegaTemp
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          # mega.py depends on the obsolete pathlib backport
          # (<https://pypi.org/project/pathlib/>) which conflicts with
          # PyInstaller on Python 3.12+. Remove it since the stdlib
          # pathlib (available since 3.4) is always available.
          pip uninstall pathlib -y 2>/dev/null || true
      - name: Build
        run: pyinstaller MegaTemp.spec --noconfirm --clean
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
      - name: Upload to Release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Only the first parallel job creates the release; subsequent jobs
          # will see it already exists and skip creation.
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes 2>/dev/null || true
          gh release upload "${{ github.ref_name }}" \
            "${{ matrix.binary }}#${{ matrix.artifact }}" --clobber
      - name: Upload source tarball (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tar --exclude-vcs \
            --exclude='venv' --exclude='.venv' \
            --exclude='credentials' --exclude='credentials.txt' \
            --exclude='tmp' --exclude='diagtmp' \
            --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='.ruff_cache' --exclude='.mypy_cache' \
            --exclude='.idea' \
            --exclude='dist' \
            -czf "dist/MegaTemp-${GITHUB_REF_NAME}-src.tar.gz" .
          gh release upload "${GITHUB_REF_NAME}" \
            "dist/MegaTemp-${GITHUB_REF_NAME}-src.tar.gz" --clobber
